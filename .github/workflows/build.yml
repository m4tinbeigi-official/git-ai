name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            ext: ".exe"
            gui_flags: "--windowed"
          - os: macos-latest
            label: macos
            ext: ""
            gui_flags: "--windowed"
          - os: ubuntu-latest
            label: linux
            ext: ""
            gui_flags: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tcl/Tk (Linux, needed for the GUI build)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tk-dev tcl-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build CLI (onefile)
        run: pyinstaller --onefile --name git-ai git_ai.py

      - name: Build GUI (onefile)
        run: pyinstaller --onefile ${{ matrix.gui_flags }} --name git-ai-gui git_ai_gui.py

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p out
          cp "dist/git-ai${{ matrix.ext }}" "out/git-ai-${{ matrix.label }}${{ matrix.ext }}"
          if [ -d "dist/git-ai-gui.app" ]; then
            (cd dist && zip -r -q "../out/git-ai-gui-${{ matrix.label }}.app.zip" "git-ai-gui.app")
          fi
          if [ -f "dist/git-ai-gui${{ matrix.ext }}" ]; then
            cp "dist/git-ai-gui${{ matrix.ext }}" "out/git-ai-gui-${{ matrix.label }}${{ matrix.ext }}"
          fi
          ls -la out

      - name: Package macOS .dmg
        if: runner.os == 'macOS'
        run: |
          mkdir -p dmg
          if [ -d "dist/git-ai-gui.app" ]; then cp -R "dist/git-ai-gui.app" dmg/; fi
          cp "dist/git-ai" "dmg/git-ai-cli" 2>/dev/null || true
          hdiutil create -volname "git-ai" -srcfolder dmg -ov -format UDZO "out/git-ai-macos.dmg"
          ls -la out

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.label }}
          path: out/*

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist

      - name: Tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: Rolling "latest" prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          files: dist/*
