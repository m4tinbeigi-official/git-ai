name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build CLI (onefile)
        run: pyinstaller --onefile --name git-ai git_ai.py

      - name: Build GUI (windowed)
        run: pyinstaller --onefile --windowed --name git-ai-gui git_ai_gui.py

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: git-ai-windows
          path: |
            dist/git-ai.exe
            dist/git-ai-gui.exe

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: git-ai-macos
          path: |
            dist/git-ai
            dist/git-ai-gui

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/git-ai
            dist/git-ai.exe
            dist/git-ai-gui
            dist/git-ai-gui.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
