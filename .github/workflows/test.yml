name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile check
        run: |
          python -m py_compile git_ai.py i18n.py
          python -c "import ast; ast.parse(open('git_ai_gui.py').read())"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
